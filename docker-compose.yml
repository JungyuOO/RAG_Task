services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build: .
    ports:
      - "8000:8000"
    # .env 파일에서 환경 변수 주입 (CLLM_BASE_URL, RAG_SOURCE_DIR 등)
    # Docker 실행 시 RAG_*_DIR 값을 /app/data/... 경로로 변경할 것 (.env.example 주석 참고)
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/corpus/pdfs:/app/data/corpus/pdfs           # 원본 PDF — 영속 필수
      - ./data/cache:/app/data/cache                        # JSON 캐시 — 재생성 가능
      - ./data/extracted_markdown:/app/data/extracted_markdown  # PDF 추출 마크다운 — 재생성 가능
      - model-cache:/app/data/models                        # HuggingFace 모델 캐시 — 재다운로드 방지
    healthcheck:
      # python:3.13-slim에는 curl 미포함 → Python 내장 urllib 사용
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/library')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s  # 첫 배포 후 실측하여 조정 권장

volumes:
  pgdata:
  model-cache:
